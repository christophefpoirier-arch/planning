<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="color-scheme" content="light">
<title>Planning Hebdomadaire</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.2.0/dist/tabler-icons.min.css">
<style>
:root{
  --green:#1D9E75;--green-l:#E1F5EE;--green-d:#085041;
  --amber:#BA7517;--amber-l:#FAEEDA;--amber-d:#633806;
  --blue:#185FA5;--blue-l:#E6F1FB;--blue-d:#0C447C;
  --red:#A32D2D;--red-l:#FCEBEB;
  --bg:#F7F6F3;--surface:#FFFFFF;--surface2:#F1EFE8;
  --border:rgba(0,0,0,0.10);--border-md:rgba(0,0,0,0.18);
  --text:#1a1a18;--text2:#5F5E5A;--text3:#888780;
  --r:12px;--rs:8px;--rp:99px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;background:#F7F6F3}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;color-scheme:light}
.nav{background:var(--surface);border-bottom:0.5px solid var(--border);padding:0 20px;display:flex;align-items:stretch;position:sticky;top:0;z-index:100;flex-wrap:wrap}
.nav-tab{font-size:15px;font-family:'DM Sans',sans-serif;color:var(--text3);background:none;border:none;border-bottom:2px solid transparent;padding:14px 16px 12px;cursor:pointer;display:flex;align-items:center;gap:6px;transition:color .15s,border-color .15s;white-space:nowrap}
.nav-tab.active{color:var(--green);border-bottom-color:var(--green);font-weight:500}
.nav-right{margin-left:auto;display:flex;align-items:center;gap:8px;padding:8px 0;flex-wrap:wrap}
.hbtn{font-size:14px;font-family:'DM Sans',sans-serif;color:var(--text2);background:none;border:0.5px solid var(--border-md);border-radius:var(--rs);padding:6px 12px;cursor:pointer;display:flex;align-items:center;gap:5px;transition:background .12s}
.hbtn:hover{background:var(--surface2)}
.hbtn.danger{color:var(--red);border-color:var(--red)}
.week-pill{font-family:'DM Mono',monospace;font-size:12px;color:var(--text3);background:var(--surface2);border:0.5px solid var(--border);border-radius:var(--rp);padding:3px 10px}
.sync-badge{font-size:12px;display:flex;align-items:center;gap:4px;padding:3px 10px;border-radius:var(--rp);border:0.5px solid var(--border);font-family:'DM Sans',sans-serif}
.sync-ok{color:var(--green);border-color:var(--green);background:var(--green-l)}
.sync-ing{color:var(--amber);border-color:var(--amber);background:var(--amber-l)}
.sync-err{color:var(--red);border-color:var(--red);background:var(--red-l)}
.page{display:none}.page.active{display:block}
.stats-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;padding:14px 20px}
.stat{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--r);padding:10px 14px;text-align:center}
.stat-val{font-size:22px;font-weight:500;color:var(--text)}
.stat-lbl{font-size:13px;color:var(--text3);margin-top:2px}
.view-bar{display:flex;align-items:center;gap:8px;padding:12px 20px 0;flex-wrap:wrap}
.view-toggle{display:flex;background:var(--surface2);border:0.5px solid var(--border);border-radius:var(--rs);overflow:hidden}
.vtbtn{font-size:14px;font-family:'DM Sans',sans-serif;color:var(--text3);background:none;border:none;padding:6px 12px;cursor:pointer;display:flex;align-items:center;gap:5px;transition:background .12s,color .12s}
.vtbtn.active{background:var(--surface);color:var(--green);font-weight:500}
.day-tabs{display:flex;gap:6px;flex-wrap:wrap}
.dtab{font-size:14px;font-family:'DM Sans',sans-serif;color:var(--text3);background:var(--surface);border:0.5px solid var(--border);border-radius:var(--rp);padding:5px 14px;cursor:pointer;transition:all .15s;white-space:nowrap}
.dtab.active{background:var(--green);border-color:var(--green);color:#fff;font-weight:500}
.dtab.today-tab{border-color:var(--green);color:var(--green)}
.dtab.today-tab.active{color:#fff}
.week-scroll{overflow-x:auto;padding:12px 20px 20px}
.week-grid{display:grid;grid-template-columns:repeat(5,minmax(200px,1fr));gap:10px;min-width:1000px}
.week-grid.single{grid-template-columns:1fr;min-width:0;max-width:640px;margin:0 auto}
.day-col{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--r);overflow:hidden}
.day-head{padding:10px 12px 8px;border-bottom:0.5px solid var(--border);background:var(--surface2);transition:background .25s,border-color .25s}
.day-head.op-chris{background:linear-gradient(135deg,#DBEAFE,#EFF6FF);border-bottom-color:#93C5FD}
.day-head.op-camille{background:linear-gradient(135deg,#FCE7F3,#FDF2F8);border-bottom-color:#F9A8D4}
.day-head.op-thierry{background:linear-gradient(135deg,#D1FAE5,#ECFDF5);border-bottom-color:#6EE7B7}
.day-name{font-size:16px;font-weight:500;color:var(--text);display:flex;align-items:center;gap:6px}
.today-dot{width:6px;height:6px;border-radius:50%;background:var(--green);display:inline-block}
.day-prog{display:flex;align-items:center;gap:6px;margin-top:6px}
.prog-bg{flex:1;height:3px;background:var(--border);border-radius:99px;overflow:hidden}
.prog-fill{height:3px;background:var(--green);border-radius:99px;transition:width .3s}
.prog-txt{font-family:'DM Mono',monospace;font-size:11px;color:var(--text3);min-width:28px;text-align:right}
.day-body{padding:8px}
.sec-header{display:flex;align-items:center;gap:6px;padding:8px 4px 5px;margin-top:6px;border-top:0.5px solid var(--border)}
.sec-header:first-child{border-top:none;margin-top:0;padding-top:2px}
.sec-icon{width:20px;height:20px;border-radius:5px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .25s}
.sec-icon i{font-size:12px;color:#fff}
.si-meteo{background:#3B82F6}
.si-couv{background:#F59E0B}
.si-horo{background:#8B5CF6}
.si-pas{background:#EC4899}
.si-chris{background:linear-gradient(135deg,#1D4ED8,#3B82F6)}
.si-camille{background:linear-gradient(135deg,#BE185D,#EC4899)}
.si-thierry{background:linear-gradient(135deg,#065F46,#10B981)}
.sec-name{font-size:14px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--text2)}
.sub-label{font-size:12px;color:var(--text3);padding:4px 4px 2px;font-style:italic}
/* OPERATEUR METEO */
.op-bar{display:flex;align-items:center;flex-wrap:wrap;padding:6px 8px;border-radius:var(--rs);margin-bottom:6px;gap:6px;border:1px solid var(--border);background:var(--surface2);transition:background .25s,border-color .25s;min-width:0;overflow:hidden}
.op-bar.chris{background:#EFF6FF;border-color:#93C5FD}
.op-bar.camille{background:#FDF2F8;border-color:#F9A8D4}
.op-bar.thierry{background:#ECFDF5;border-color:#6EE7B7}
.op-who{font-size:13px;font-weight:500;color:var(--text3);transition:color .25s}
.op-who.chris{color:#1D4ED8}
.op-who.camille{color:#BE185D}
.op-who.thierry{color:#065F46}
.op-btns{display:flex;gap:4px}
.op-btn{font-size:12px;font-family:'DM Sans',sans-serif;padding:4px 10px;border-radius:var(--rp);border:1px solid transparent;cursor:pointer;transition:all .15s;font-weight:500;opacity:.5}
.op-btn:hover{opacity:.8}
.op-btn.active{opacity:1;box-shadow:0 1px 4px rgba(0,0,0,0.15)}
.op-btn.chris{background:#DBEAFE;color:#1D4ED8;border-color:#93C5FD}
.op-btn.camille{background:#FCE7F3;color:#BE185D;border-color:#F9A8D4}
.op-btn.thierry{background:#D1FAE5;color:#065F46;border-color:#6EE7B7}
/* TACHES */
.task-row{display:flex;align-items:flex-start;gap:7px;padding:7px 6px;border-radius:var(--rs);cursor:pointer;margin-bottom:2px;transition:background .1s;user-select:none;-webkit-tap-highlight-color:transparent}
.task-row:hover{background:var(--surface2)}
.task-row.done{opacity:.45}
.task-row.done .task-lbl{text-decoration:line-through;color:var(--text3)}
.chk{width:18px;height:18px;border-radius:50%;border:1.5px solid var(--border-md);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;transition:all .15s}
.chk.on{background:var(--green);border-color:var(--green)}
.chk i{font-size:11px;color:#fff;opacity:0;transition:opacity .12s}
.chk.on i{opacity:1}
.task-meta{flex:1;min-width:0}
.task-lbl{font-size:16px;color:var(--text);line-height:1.3}
.del-btn{opacity:0;background:none;border:none;cursor:pointer;color:var(--text3);padding:2px;border-radius:4px;display:flex;align-items:center;transition:opacity .12s,color .12s;flex-shrink:0}
.task-row:hover .del-btn{opacity:1}
.del-btn:hover{color:var(--red)}
@media(pointer:coarse){.del-btn{opacity:1}}
.badge{font-size:11px;padding:2px 7px;border-radius:99px;flex-shrink:0;margin-top:2px;font-weight:500}
.b-a{background:var(--green-l);color:var(--green-d)}
.b-h{background:var(--blue-l);color:var(--blue-d)}
.multi-row{display:flex;align-items:center;gap:6px;padding:6px 6px;border-radius:var(--rs);margin-bottom:2px;transition:background .1s}
.multi-row:hover{background:var(--surface2)}
.multi-lbl{font-size:16px;color:var(--text);flex:1;line-height:1.3}
.multi-checks{display:flex;gap:5px;flex-shrink:0}
.jchk-wrap{display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer}
.jchk-lbl{font-size:11px;font-family:'DM Mono',monospace;color:var(--text3)}
.jchk{width:17px;height:17px;border-radius:4px;border:1.5px solid var(--border-md);display:flex;align-items:center;justify-content:center;transition:all .15s}
.jchk.on{background:var(--green);border-color:var(--green)}
.jchk i{font-size:10px;color:#fff;opacity:0;transition:opacity .12s}
.jchk.on i{opacity:1}
.multi-del{opacity:0;background:none;border:none;cursor:pointer;color:var(--text3);padding:2px;border-radius:4px;display:flex;align-items:center}
.multi-row:hover .multi-del{opacity:1}
@media(pointer:coarse){.multi-del{opacity:1}}
.add-row{display:flex;gap:4px;padding:6px 4px 2px;margin-top:6px;border-top:0.5px solid var(--border);flex-wrap:wrap}
.add-row input{flex:1;min-width:70px;font-size:15px;font-family:'DM Sans',sans-serif;border:0.5px solid var(--border-md);border-radius:var(--rs);padding:6px 8px;background:var(--surface2);color:var(--text);outline:none}
.add-row input:focus{border-color:var(--green)}
.add-row select{font-size:13px;font-family:'DM Sans',sans-serif;border:0.5px solid var(--border-md);border-radius:var(--rs);padding:6px 4px;background:var(--surface2);color:var(--text2);cursor:pointer;outline:none}
.add-btn{font-size:14px;width:30px;height:30px;border-radius:var(--rs);border:0.5px solid var(--green);background:var(--green-l);color:var(--green-d);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.free-zone{margin-top:10px;border-top:1.5px dashed var(--border-md);padding-top:8px}
.free-zone-head{display:flex;align-items:center;gap:6px;margin-bottom:6px}
.free-zone-icon{width:20px;height:20px;border-radius:5px;background:#E11D48;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.free-zone-icon i{font-size:12px;color:#fff}
.free-zone-title{font-size:14px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--text2)}
.free-task-row{display:flex;align-items:flex-start;gap:7px;padding:7px 6px;border-radius:var(--rs);cursor:pointer;margin-bottom:2px;transition:background .1s;user-select:none}
.free-task-row:hover{background:var(--surface2)}
.free-task-row.done{opacity:.45}
.free-task-row.done .free-task-lbl{text-decoration:line-through;color:var(--text3)}
.free-chk{width:18px;height:18px;border-radius:4px;border:1.5px solid #E11D48;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;transition:all .15s}
.free-chk.on{background:#E11D48;border-color:#E11D48}
.free-chk i{font-size:11px;color:#fff;opacity:0;transition:opacity .12s}
.free-chk.on i{opacity:1}
.free-task-lbl{font-size:16px;color:var(--text);flex:1;font-weight:500}
.free-del{opacity:0;background:none;border:none;cursor:pointer;color:var(--text3);padding:2px;border-radius:4px;display:flex;align-items:center}
.free-task-row:hover .free-del{opacity:1}
@media(pointer:coarse){.free-del{opacity:1}}
.free-add-row{display:flex;gap:6px;margin-top:6px}
.free-add-row input{flex:1;font-size:15px;font-family:'DM Sans',sans-serif;border:1px dashed #E11D48;border-radius:var(--rs);padding:6px 8px;background:transparent;color:var(--text);outline:none}
.free-add-row input:focus{background:var(--surface2);border-style:solid}
.free-add-btn{width:30px;height:30px;border-radius:var(--rs);border:0.5px solid #E11D48;background:#FFF1F4;color:#E11D48;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px}
/* HISTORIQUE */
.arch-wrap{padding:20px}
.arch-empty{text-align:center;padding:48px 20px;color:var(--text3);font-size:15px}
.arch-empty i{font-size:36px;display:block;margin-bottom:12px;opacity:.4}
.chart-section{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:16px}
.chart-title{font-size:14px;font-weight:500;color:var(--text)}
.bar-chart{display:flex;align-items:flex-end;gap:6px;height:110px;padding-bottom:22px;position:relative;border-bottom:0.5px solid var(--border);margin-top:14px}
.bar-wrap{flex:1;display:flex;flex-direction:column;align-items:center;height:100%}
.bar-outer{flex:1;width:100%;display:flex;align-items:flex-end;position:relative}
.bar-inner{width:100%;border-radius:4px 4px 0 0;background:var(--green-l);border:0.5px solid var(--green);min-height:2px;position:relative}
.bar-inner.best{background:var(--green)}
.bar-val{position:absolute;top:-18px;left:50%;transform:translateX(-50%);font-size:10px;font-family:'DM Mono',monospace;color:var(--text3);white-space:nowrap}
.bar-lbl{font-size:10px;color:var(--text3);text-align:center;position:absolute;bottom:-20px;left:50%;transform:translateX(-50%);white-space:nowrap;font-family:'DM Mono',monospace}
.arch-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:10px}
.arch-card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--r);padding:14px 16px;cursor:pointer}
.arch-card:hover{border-color:var(--border-md)}
.arch-card-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.arch-week{font-size:15px;font-weight:500;color:var(--text)}
.arch-date{font-family:'DM Mono',monospace;font-size:12px;color:var(--text3)}
.arch-pct{font-size:24px;font-weight:500;color:var(--green)}
.arch-pct.mid{color:var(--amber)}.arch-pct.low{color:var(--red)}
.arch-prog-bg{height:4px;background:var(--surface2);border-radius:99px;overflow:hidden;margin-bottom:10px}
.arch-prog-fill{height:4px;border-radius:99px;background:var(--green)}
.arch-prog-fill.mid{background:var(--amber)}.arch-prog-fill.low{background:var(--red)}
.arch-details{display:flex;gap:12px}
.arch-det{font-size:13px;color:var(--text3)}
.arch-det strong{color:var(--text2);font-weight:500}
.detail-panel{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--r);padding:16px;margin-top:12px;display:none}
.detail-panel.open{display:block}
.detail-back{display:flex;align-items:center;gap:6px;font-size:14px;color:var(--text3);cursor:pointer;margin-bottom:14px}
.detail-days{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}
.detail-day{background:var(--surface2);border-radius:var(--rs);padding:10px}
.detail-day-name{font-size:13px;font-weight:500;color:var(--text);margin-bottom:6px}
.detail-task{font-size:13px;color:var(--text3);padding:3px 0;display:flex;align-items:center;gap:5px;border-bottom:0.5px solid var(--border)}
.detail-task:last-child{border-bottom:none}
.detail-task.dn{color:var(--green-d);text-decoration:line-through;opacity:.6}
.detail-task.dn i{color:var(--green)}
/* MODAL */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:200;align-items:center;justify-content:center;padding:20px}
.modal-bg.show{display:flex}
.modal{background:var(--surface);border:0.5px solid var(--border-md);border-radius:var(--r);padding:20px;width:100%;max-width:300px;text-align:center}
.modal p{font-size:15px;color:var(--text);line-height:1.5;margin-bottom:16px}
.modal-btns{display:flex;gap:10px;justify-content:center}
.modal-btns button{font-size:14px;font-family:'DM Sans',sans-serif;padding:8px 18px;border-radius:var(--rs);cursor:pointer}
.btn-cancel{border:0.5px solid var(--border-md);background:none;color:var(--text2)}
.btn-confirm{border:0.5px solid var(--red);background:var(--red-l);color:var(--red)}
.loading{display:flex;align-items:center;justify-content:center;padding:80px 20px;color:var(--text3);font-size:15px;gap:10px}
@keyframes spin{to{transform:rotate(360deg)}}
/* NAVIGATION SEMAINES */
.week-nav{display:flex;align-items:center;gap:8px;padding:10px 20px 0;flex-wrap:wrap;border-top:0.5px solid var(--border);margin-top:2px}
.wnav-btn{width:30px;height:30px;border-radius:50%;border:0.5px solid var(--border-md);background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text2);transition:background .12s;flex-shrink:0}
.wnav-btn:hover{background:var(--surface2)}
.wnav-btn i{font-size:15px}
.wnav-label{font-size:13px;font-weight:500;color:var(--text);font-family:'DM Mono',monospace;min-width:160px;text-align:center}
.wnav-today-btn{font-size:12px;font-family:'DM Sans',sans-serif;padding:4px 12px;border-radius:var(--rp);border:0.5px solid var(--green);background:var(--green-l);color:var(--green-d);cursor:pointer;white-space:nowrap}
.wnav-future-badge{font-size:11px;padding:3px 10px;border-radius:var(--rp);background:#FEF9C3;color:#713F12;border:0.5px solid #FDE047;font-weight:500}
.wnav-note{flex:1;min-width:140px;font-size:13px;font-family:'DM Sans',sans-serif;border:0.5px solid var(--border-md);border-radius:var(--rs);padding:5px 10px;background:var(--surface2);color:var(--text);outline:none}
.wnav-note:focus{border-color:var(--green);background:#fff}
.wnav-note::placeholder{color:var(--text3)}

.spin{animation:spin 1s linear infinite;display:inline-block}
/* ÉQUIPE / CONGÉS */
.equipe-wrap{padding:20px}
.equipe-person{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--r);margin-bottom:12px;overflow:hidden}
.equipe-person-head{display:flex;align-items:center;gap:10px;padding:14px 16px;border-bottom:0.5px solid var(--border)}
.equipe-avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#fff;flex-shrink:0}
.av-chris{background:linear-gradient(135deg,#1D4ED8,#3B82F6)}
.av-camille{background:linear-gradient(135deg,#BE185D,#EC4899)}
.av-thierry{background:linear-gradient(135deg,#065F46,#10B981)}
.equipe-person-name{font-size:16px;font-weight:600;color:var(--text)}
.conge-list{padding:10px 16px}
.conge-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:0.5px solid var(--border)}
.conge-item:last-child{border-bottom:none}
.conge-dates{font-size:14px;color:var(--text);flex:1;font-family:'DM Mono',monospace}
.conge-label{font-size:13px;color:var(--text3);flex:1}
.conge-del{background:none;border:none;cursor:pointer;color:var(--text3);padding:4px;border-radius:6px;display:flex;align-items:center}
.conge-del:hover{color:var(--red);background:var(--red-l)}
.conge-add-form{display:flex;gap:8px;padding:10px 16px 14px;flex-wrap:wrap;align-items:flex-end}
.conge-add-form input[type=date]{font-size:13px;font-family:'DM Sans',sans-serif;border:0.5px solid var(--border-md);border-radius:var(--rs);padding:6px 10px;background:var(--surface2);color:var(--text);outline:none;cursor:pointer}
.conge-add-form input[type=date]:focus{border-color:var(--green)}
.conge-add-form input[type=text]{flex:1;min-width:120px;font-size:13px;font-family:'DM Sans',sans-serif;border:0.5px solid var(--border-md);border-radius:var(--rs);padding:6px 10px;background:var(--surface2);color:var(--text);outline:none}
.conge-add-form input[type=text]:focus{border-color:var(--green)}

const db = getDatabase(initializeApp(FC));

onValue(CREF, snap=>{

};

function syncBadge(s){
  const el=document.getElementById("sync-status");
  if(!el)return;
  if(s==="ok"){el.innerHTML='<i class="ti ti-cloud-check"></i> Synchronisé';el.className="sync-badge sync-ok";}
  else if(s==="sync"){el.innerHTML='<i class="ti ti-cloud-upload"></i> Envoi…';el.className="sync-badge sync-ing";}
  else{el.innerHTML='<i class="ti ti-cloud-off"></i> Hors ligne';el.className="sync-badge sync-err";}
}

window.fbSave = function(){
  syncBadge("sync");
  try{localStorage.setItem("planning_v5",JSON.stringify(window.ST));}catch(e){}
  const curWn=window.browsingWn||window.currentWn;
  if(curWn===window.currentWn){
    set(SREF, JSON.parse(JSON.stringify(window.ST)))
      .then(()=>syncBadge("ok")).catch(()=>syncBadge("err"));
  } else {
    set(FWREF(curWn), JSON.parse(JSON.stringify(window.ST)))
      .then(()=>syncBadge("ok")).catch(()=>syncBadge("err"));
  }
};
window.fbSaveHist = function(){
  try{localStorage.setItem("planning_hist_v5",JSON.stringify(window.HIST));}catch(e){}
  set(HREF, JSON.parse(JSON.stringify(window.HIST))).catch(()=>{});
};
window.fbSaveNote = function(wkey, note){
  set(ref(db,"planning/notes/"+wkey), note).catch(()=>{});
  try{const n=JSON.parse(localStorage.getItem("planning_notes")||"{}");n[wkey]=note;localStorage.setItem("planning_notes",JSON.stringify(n));}catch(e){}
};
window.fbLoadWeek = function(wkey, cb){
  const isCurrentWeek = (wkey===window.currentWn);
  if(isCurrentWeek){cb(window.ST_MAIN);}
  else{
    const r=ref(db,"planning/future/"+wkey);
    import("https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js").then(({get})=>{
      get(r).then(snap=>{
        const v=snap.val();
        if(v&&v.tasks){cb(v);}
        else{
          // Semaine vide : créer structure par défaut
          const base=JSON.parse(JSON.stringify(window._DEF_TASKS));
          cb({tasks:base,done:{},free:{},operateurs:{},weekNote:""});
        }
      }).catch(()=>cb(null));
    });
  }
};
window.fbLoadNote = function(wkey, cb){
  import("https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js").then(({get})=>{
    get(ref(db,"planning/notes/"+wkey)).then(snap=>{cb(snap.val()||"");}).catch(()=>cb(""));
  });
};

onValue(SREF, snap=>{
  const v=snap.val();
  if(v && v.tasks){
    window.ST_MAIN=v;
    if(!window.browsingWn||window.browsingWn===window.currentWn){
      window.ST=v;
      if(!window.ST.done)window.ST.done={};
      if(!window.ST.free)window.ST.free={};
      if(!window.ST.operateurs)window.ST.operateurs={};
    }
  } else {
    const base=JSON.parse(JSON.stringify(window._DEF_TASKS||{}));
    window.ST_MAIN={tasks:base,done:{},free:{},operateurs:{}};
    window.ST=window.ST_MAIN;
    set(SREF, JSON.parse(JSON.stringify(window.ST)));
  }
  showPlanning();
  syncBadge("ok");
});

onValue(HREF, snap=>{
  const v=snap.val();
  if(v && Array.isArray(v)) window.HIST=v;
});
</script>

let viewMode="semaine", activeDay=DAYS[TODAY>=0?TODAY:0], pendingDel=null;

// Navigation semaines
function wn(offset){
  const d=new Date();
  d.setDate(d.getDate()+(offset||0)*7);
  const j=new Date(d.getFullYear(),0,1);
  return{n:Math.ceil(((d-j)/86400000+j.getDay()+1)/7),y:d.getFullYear()};
}
function wnKey(n,y){return y+"-S"+String(n).padStart(2,"0");}
function wlabelFromOffset(offset){
  const d=new Date();
  d.setDate(d.getDate()+(offset||0)*7);
  const dy=d.getDay(),df=d.getDate()-dy+(dy===0?-6:1);
  const mo=new Date(d);mo.setDate(df);
  const fr=new Date(mo);fr.setDate(mo.getDate()+4);
  const f=x=>x.getDate()+"/"+(x.getMonth()+1);
  const{n,y}=wn(offset);
  return"S"+n+" ("+y+") · "+f(mo)+" → "+f(fr);
}

const _wn0=wn(0);
window.currentWn=wnKey(_wn0.n,_wn0.y);
window.browsingWn=window.currentWn;
let weekOffset=0;

function navWeek(dir){
  weekOffset+=dir;
  const{n,y}=wn(weekOffset);
  window.browsingWn=wnKey(n,y);
  const isCurrent=(window.browsingWn===window.currentWn);
  document.getElementById("wnav-today-btn").style.display=isCurrent?"none":"inline-flex";
  document.getElementById("wnav-future-badge").style.display=(!isCurrent&&weekOffset>0)?"inline-flex":"none";
  document.getElementById("wnav-label").textContent=wlabelFromOffset(weekOffset);
  // Charge les notes de la semaine
  window.fbLoadNote(window.browsingWn, note=>{
    const el=document.getElementById("wnav-note");
    if(el)el.value=note||"";
  });
  // Charge les tâches de la semaine
  document.getElementById("planning-loading").style.display="flex";
  document.getElementById("planning-content").style.display="none";

      if(!window.ST.free)window.ST.free={};
      if(!window.ST.operateurs)window.ST.operateurs={};
    }
    showPlanning();
  });
}

function cntDay(day){
  let t=0,d=0;
  window.ST.tasks[day].forEach(sec=>sec.tasks.forEach(tk=>{
    if(tk.m){[1,2,3].forEach(j=>{t++;if(window.ST.done[tk.id+"_j"+j])d++;});}
    else{t++;if(window.ST.done[tk.id])d++;}
  }));
  return{t,d};
}
function cntAll(){let t=0,d=0;DAYS.forEach(dy=>{const c=cntDay(dy);t+=c.t;d+=c.d;});return{t,d};}

function toggle(id){window.ST.done[id]=!window.ST.done[id];window.fbSave();renderPlanning();}
function toggleJ(id,j){const k=id+"_j"+j;window.ST.done[k]=!window.ST.done[k];window.fbSave();renderPlanning();}
function toggleFree(id){window.ST.done[id]=!window.ST.done[id];window.fbSave();renderPlanning();}

function setOp(day, op){
  if(!window.ST.operateurs) window.ST.operateurs={};
  // Multi-sélection max 2 pour tous les jours
  let sel = window.ST.operateurs[day];
  sel = Array.isArray(sel) ? sel : (sel ? [sel] : []);
  if(sel.includes(op)){
    sel = sel.filter(s=>s!==op);
  } else {
    if(sel.length < 2) sel = [...sel, op];
    else sel = [sel[1], op];
  }
  window.ST.operateurs[day] = sel.length ? sel : null;
  window.fbSave(); renderPlanning();
}

function delTask(day,si,id,name){
  pendingDel={day,si,id};
  document.getElementById("modal-name").textContent='"'+name+'"';
  document.getElementById("modal").classList.add("show");
}
function hideModal(){document.getElementById("modal").classList.remove("show");pendingDel=null;}
function confirmDelete(){
  if(!pendingDel)return;
  const{day,si,id}=pendingDel;
  window.ST.tasks[day][si].tasks=window.ST.tasks[day][si].tasks.filter(t=>t.id!==id);
  delete window.ST.done[id];[1,2,3].forEach(j=>delete window.ST.done[id+"_j"+j]);
  window.fbSave();hideModal();renderPlanning();
}
function addTask(day,si){
  const inp=document.getElementById("inp-"+day+"-"+si);
  const bsel=document.getElementById("bsel-"+day+"-"+si);
  const name=inp.value.trim();if(!name)return;
  window.ST.tasks[day][si].tasks.push({id:"c"+Date.now(),n:name,b:bsel.value,m:day==="vendredi"?1:0});
  window.fbSave();inp.value="";renderPlanning();
}
function addFree(day){
  const inp=document.getElementById("free-inp-"+day);
  const name=inp.value.trim();if(!name)return;
  if(!window.ST.free[day])window.ST.free[day]=[];
  window.ST.free[day].push({id:"f"+Date.now(),n:name});
  window.fbSave();inp.value="";renderPlanning();
}
function delFree(day,id){
  window.ST.free[day]=window.ST.free[day].filter(t=>t.id!==id);
  delete window.ST.done[id];window.fbSave();renderPlanning();
}
function resetWeek(){if(!confirm("Remettre toutes les cases à zéro ?"))return;window.ST.done={};window.fbSave();renderPlanning();}
function clearAll(){
  if(!confirm("Rétablir le planning par défaut ?"))return;
  window.ST={tasks:JSON.parse(JSON.stringify(DEF)),done:{},free:{},operateurs:{}};
  window.fbSave();renderPlanning();
}
function archiveAndReset(){
  if(!confirm("Archiver la semaine en cours et démarrer une nouvelle semaine ?"))return;
  const{t,d}=cntAll();const days={};
  DAYS.forEach(day=>{
    const tasks=[];
    window.ST.tasks[day].forEach(sec=>sec.tasks.forEach(tk=>{
      if(tk.m){tasks.push({n:tk.n+" J+1/J+2/J+3",done:[1,2,3].every(j=>window.ST.done[tk.id+"_j"+j])});}
      else{tasks.push({n:tk.n,done:!!window.ST.done[tk.id]});}
    }));
    const c=cntDay(day);days[day]={tasks,done:c.d,total:c.t};
  });
  const now=new Date();
  const snap={wn:wn(),year:now.getFullYear(),label:wlabel(),date:now.toLocaleDateString('fr-FR'),t,d,pct:t?Math.round(d/t*100):0,days};
  const ex=window.HIST.findIndex(h=>h.wn===snap.wn&&h.year===snap.year);
  if(ex>=0)window.HIST[ex]=snap;else window.HIST.unshift(snap);
  window.fbSaveHist();
  window.ST={tasks:JSON.parse(JSON.stringify(DEF)),done:{},free:{},operateurs:{}};
  window.fbSave();renderPlanning();
  alert("Semaine "+snap.label+" archivée — "+snap.pct+"% !");
}

function setOp(day,op){
  if(!window.ST.operateurs)window.ST.operateurs={};

  if(sel.includes(op)){sel=sel.filter(s=>s!==op);}

/* ---- CONGÉS / ÉQUIPE ---- */
const OP_COLORS_DARK={chris:'#1D4ED8',camille:'#BE185D',thierry:'#065F46'};
const OP_COLORS_LIGHT={chris:'#DBEAFE',camille:'#FCE7F3',thierry:'#D1FAE5'};
const OP_INITIALS={chris:'C',camille:'Ca',thierry:'T'};

function dateToTs(str){return new Date(str).getTime();}
function tsToStr(ts){const d=new Date(ts);return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function isAbsent(op, dateStr){
  if(!window.CONGES||!window.CONGES[op])return false;
  const ts=dateToTs(dateStr);
  return window.CONGES[op].some(c=>ts>=dateToTs(c.debut)&&ts<=dateToTs(c.fin));
}
function isAbsentThisWeek(op, weekMondayDate){
  // Vérifie si absent au moins un jour de la semaine
  for(let i=0;i<5;i++){
    const d=new Date(weekMondayDate);d.setDate(d.getDate()+i);
    if(isAbsent(op,tsToStr(d.getTime())))return true;
  }
  return false;
}
function getAbsentLabel(op, dateStr){
  if(!window.CONGES||!window.CONGES[op])return null;
  const ts=dateToTs(dateStr);
  const c=window.CONGES[op].find(c=>ts>=dateToTs(c.debut)&&ts<=dateToTs(c.fin));
  return c?c.label||"Congés":null;
}

function addConge(op){
  const debut=document.getElementById("conge-debut-"+op).value;
  const fin=document.getElementById("conge-fin-"+op).value;
  const label=document.getElementById("conge-label-"+op).value.trim()||"Congés";
  if(!debut||!fin){alert("Merci de saisir une date de début et de fin.");return;}
  if(dateToTs(fin)<dateToTs(debut)){alert("La date de fin doit être après la date de début.");return;}
  if(!window.CONGES)window.CONGES={};
  if(!window.CONGES[op])window.CONGES[op]=[];
  window.CONGES[op].push({id:"cg"+Date.now(),debut,fin,label});
  window.fbSaveConges();
  document.getElementById("conge-debut-"+op).value="";
  document.getElementById("conge-fin-"+op).value="";
  document.getElementById("conge-label-"+op).value="";
  renderEquipe();
}

function delConge(op,id){
  if(!window.CONGES||!window.CONGES[op])return;
  window.CONGES[op]=window.CONGES[op].filter(c=>c.id!==id);
  window.fbSaveConges();
  renderEquipe();
}

function renderEquipe(){
  const now=new Date();
  const dow=now.getDay();
  const thisMonday=new Date(now);
  thisMonday.setDate(now.getDate()-dow+(dow===0?-6:1));
  thisMonday.setHours(0,0,0,0);
  const todayStr=tsToStr(now.getTime());

  const weeks=[];
  for(let w=-1;w<=6;w++){
    const mo=new Date(thisMonday);mo.setDate(thisMonday.getDate()+w*7);
    const days=[];
    for(let d=0;d<5;d++){const dt=new Date(mo);dt.setDate(mo.getDate()+d);days.push(dt);}
    const wnCalc=(()=>{const j=new Date(mo.getFullYear(),0,1);return Math.ceil(((mo-j)/86400000+j.getDay()+1)/7);})();
    weeks.push({mo,days,wn:wnCalc});
  }

  const JOURS=['L','M','M','J','V'];
  const OP_BORDER={chris:'#1D4ED8',camille:'#BE185D',thierry:'#065F46'};
  const OP_BG_C={chris:'#DBEAFE',camille:'#FCE7F3',thierry:'#D1FAE5'};

  let thead=`<thead>
    <tr>
      <th style="background:var(--surface2);border:0.5px solid var(--border);padding:6px 10px;text-align:left;font-size:12px;color:var(--text3)">Personne</th>
      ${weeks.map(w=>`<th colspan="5" style="background:#F0EDE6;font-size:11px;font-weight:700;color:var(--text2);text-align:center;padding:5px 4px;border:0.5px solid var(--border);white-space:nowrap">S${w.wn} · ${w.days[0].getDate()}/${w.days[0].getMonth()+1}</th>`).join("")}
    </tr>
    <tr>
      <th style="background:var(--surface2);border:0.5px solid var(--border)"></th>
      ${weeks.map(w=>w.days.map((dt,di)=>{
        const dstr=tsToStr(dt.getTime());
        const isToday=dstr===todayStr;
        return`<th style="background:${isToday?'#1a1a18':'var(--surface2)'};color:${isToday?'#fff':'var(--text3)'};border:0.5px solid var(--border);padding:4px 2px;font-size:11px;text-align:center;min-width:34px">
          <div style="font-weight:600">${JOURS[di]}</div>
          <div style="font-size:10px;opacity:.75">${dt.getDate()}</div>
        </th>`;
      }).join("")).join("")}
    </tr>
  </thead>`;

  let tbody=`<tbody>${OPERATEURS.map(op=>`
    <tr>
      <td style="background:var(--surface2);padding:8px 10px;font-size:13px;font-weight:600;color:var(--text);white-space:nowrap;border:0.5px solid var(--border)">
        <span style="width:20px;height:20px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;margin-right:5px;vertical-align:middle" class="av-${op}">${OP_LABEL[op][0]}</span>${OP_LABEL[op]}
      </td>
      ${weeks.map(w=>w.days.map((dt,di)=>{
        const dstr=tsToStr(dt.getTime());
        const isToday=dstr===todayStr;
        const absent=isAbsent(op,dstr);
        const lbl=absent?getAbsentLabel(op,dstr):"";
        const prevDt=new Date(dt);prevDt.setDate(dt.getDate()-1);
        const isStart=absent&&(di===0||!isAbsent(op,tsToStr(prevDt.getTime())));
        let cellBg=isToday?'#FFF9E6':'var(--surface)';
        if(absent)cellBg=OP_BG_C[op];
        const borderLeft=isStart?`border-left:3px solid ${OP_BORDER[op]}`:'';
        let content='';
        if(absent&&isStart&&lbl){
          content=`<span style="font-size:9px;font-weight:600;color:${OP_BORDER[op]};white-space:nowrap;overflow:hidden;display:block;padding:0 2px;line-height:1.2">🏖️<br>${lbl}</span>`;
        }else if(absent){
          content=`<span style="display:block;height:4px;background:${OP_BORDER[op]};opacity:.4;border-radius:2px;margin:0 3px"></span>`;
        }else{
          content=`<span style="color:#10B981;font-size:13px;font-weight:700">✓</span>`;
        }
        return`<td style="background:${cellBg};${borderLeft};border:0.5px solid var(--border);text-align:center;vertical-align:middle;height:34px;padding:2px">${content}</td>`;
      }).join("")).join("")}
    </tr>`).join("")}</tbody>`;

  document.getElementById("equipe-calendar").innerHTML=`
    <div style="font-size:15px;font-weight:600;color:var(--text);margin-bottom:10px">Calendrier des présences — 8 semaines</div>
    <div class="cal-scroll"><table class="cal-table" style="border-collapse:collapse;min-width:900px;width:100%">${thead}${tbody}</table></div>`;

  let formHtml=`<div style="font-size:15px;font-weight:600;color:var(--text);margin:20px 0 12px">Gérer les congés</div>`+
  OPERATEURS.map(op=>{
    const conges=(window.CONGES&&window.CONGES[op])||[];
    const listHtml=conges.length
      ?conges.map(c=>`<div class="conge-item">
          <span class="conge-dates">${c.debut.split('-').reverse().join('/')} → ${c.fin.split('-').reverse().join('/')}</span>
          <span class="conge-label">${c.label||'Congés'}</span>
          <button class="conge-del" onclick="delConge('${op}','${c.id}')"><i class="ti ti-trash" style="font-size:14px"></i></button>
        </div>`).join("")
      :`<div style="padding:8px 0;font-size:13px;color:var(--text3);font-style:italic">Aucun congé planifié</div>`;
    return`<div class="equipe-person">
      <div class="equipe-person-head">
        <div class="equipe-avatar av-${op}">${OP_LABEL[op][0]}</div>
        <span class="equipe-person-name">${OP_LABEL[op]}</span>
      </div>
      <div class="conge-list">${listHtml}</div>
      <div class="conge-add-form">
        <div><div style="font-size:12px;color:var(--text3);margin-bottom:3px">Début</div><input type="date" id="conge-debut-${op}"></div>
        <div><div style="font-size:12px;color:var(--text3);margin-bottom:3px">Fin</div><input type="date" id="conge-fin-${op}"></div>
        <div style="flex:1;min-width:120px"><div style="font-size:12px;color:var(--text3);margin-bottom:3px">Motif (optionnel)</div><input type="text" id="conge-label-${op}" placeholder="Congés, Formation…"></div>
        <button class="conge-add-btn" onclick="addConge('${op}')"><i class="ti ti-plus" style="font-size:13px;vertical-align:-1px;margin-right:4px"></i>Ajouter</button>
      </div>
    </div>`;
  }).join("");

  document.getElementById("equipe-form-area").innerHTML=formHtml;
}

/* ---- BADGE ABSENT dans opBar ---- */
function absentBadge(op, day){
  // Calcule la date du jour dans la semaine affichée
  const now=new Date();
  const base=new Date(now);base.setDate(now.getDate()+(weekOffset||0)*7);
  const dow=base.getDay();
  const monday=new Date(base);monday.setDate(base.getDate()-dow+(dow===0?-6:1));
  const dayIdx=DAYS.indexOf(day);
  const dayDate=new Date(monday);dayDate.setDate(monday.getDate()+dayIdx);
  const dateStr=tsToStr(dayDate.getTime());
  if(isAbsent(op,dateStr)){
    const lbl=getAbsentLabel(op,dateStr)||"Congés";
    return`<span style="font-size:11px;font-weight:600;padding:2px 7px;border-radius:99px;background:#FEF9C3;color:#713F12;border:1px solid #FDE047;flex-shrink:0">🏖️ ${lbl}</span>`;
  }
  return "";
}

/* ---- OVERRIDE opBar to include absent badge ---- */
function opBar(day){
  const op=(window.ST.operateurs&&window.ST.operateurs[day])||null;
  const sel=Array.isArray(op)?op:(op?[op]:[]);
  let label="Qui fait la météo ?";
  if(sel.length===1)label="✦ "+OP_LABEL[sel[0]];
  if(sel.length===2)label="✦ "+OP_LABEL[sel[0]]+" & "+OP_LABEL[sel[1]];
  const cls=sel.length===1?sel[0]:"none";
  const barStyle=sel.length===2
    ?`background:linear-gradient(135deg,${sel[0]==='chris'?'#DBEAFE':sel[0]==='camille'?'#FCE7F3':'#D1FAE5'} 50%,${sel[1]==='chris'?'#DBEAFE':sel[1]==='camille'?'#FCE7F3':'#D1FAE5'} 50%);border-color:var(--border-md)`
    :"";
  const absentBadges=sel.map(o=>absentBadge(o,day)).join("");
  return`<div class="op-bar ${cls}" style="${barStyle};flex-wrap:wrap;gap:6px">
    <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;flex:1;min-width:0">
      <span class="op-who ${sel.length===1?sel[0]:''}" style="${sel.length===2?'color:var(--text);font-weight:500':''}font-size:12px;flex-shrink:0">${label}</span>
      ${absentBadges}
    </div>
    <div class="op-btns" style="display:flex;gap:4px;flex-wrap:wrap;justify-content:flex-end;flex-shrink:0">
      ${OPERATEURS.map(o=>`<button class="op-btn ${o}${sel.includes(o)?" active":""}" style="flex-shrink:0;padding:4px 8px;font-size:11px" onclick="event.stopPropagation();setOp('${day}','${o}')">${OP_LABEL[o]}</button>`).join("")}
    </div>
  </div>`;
}

/* ---- Init congés locale ---- */
try{const c=localStorage.getItem("planning_conges");if(c)window.CONGES=JSON.parse(c);}catch(e){}
if(!window.CONGES)window.CONGES={};
if(!window.fbSaveConges)window.fbSaveConges=function(){try{localStorage.setItem("planning_conges",JSON.stringify(window.CONGES));}catch(e){}};

/* ---- Patch showPage for equipe ---- */
const _showPageOrig=window.showPage||function(){};
window.showPage=function(p){
  document.querySelectorAll(".page").forEach(el=>el.classList.remove("active"));
  document.querySelectorAll(".nav-tab").forEach(el=>el.classList.remove("active"));
  document.getElementById("page-"+p).classList.add("active");
  document.getElementById("tab-"+p).classList.add("active");
  if(p==="historique")renderHistory();
  if(p==="equipe")renderEquipe();
};
const JIDX={lundi:1,mardi:2,mercredi:3,jeudi:4,vendredi:5};
function nonCoches(day){
  if(!window.ST||!window.ST.tasks||!window.ST.tasks[day])return[];
  const r=[];
  window.ST.tasks[day].forEach(sec=>sec.tasks.forEach(t=>{
    if(t.m){const mq=[1,2,3].filter(j=>!window.ST.done[t.id+"_j"+j]);if(mq.length)r.push(t.n);}
    else if(!window.ST.done[t.id])r.push(t.n);
  }));
  if(window.ST.free&&window.ST.free[day])window.ST.free[day].forEach(t=>{if(!window.ST.done[t.id])r.push("⚠ "+t.n);});
  return r;
}
function banniere(dayName,non){
  const msg=non.length===1?"1 tâche non cochée : "+non[0]:non.length+" tâches non cochées : "+non.slice(0,3).join(", ")+(non.length>3?" …":"");
  let b=document.getElementById("alert-banner");
  if(!b){b=document.createElement("div");b.id="alert-banner";
    b.style.cssText="position:fixed;bottom:20px;right:20px;background:#E11D48;color:#fff;padding:14px 18px;border-radius:12px;font-size:15px;font-family:'DM Sans',sans-serif;max-width:340px;box-shadow:0 4px 20px rgba(0,0,0,0.3);z-index:500;line-height:1.5;cursor:pointer";
    b.onclick=()=>b.remove();document.body.appendChild(b);}
  b.innerHTML=`<strong>⏰ 15h — ${DLF[dayName]}</strong><br>${msg}<br><small style="opacity:.8;font-size:12px">Clique pour fermer</small>`;
  setTimeout(()=>{if(b)b.remove();},30000);
}
async function initAlertes(){
  let swReg=null;
  if('serviceWorker' in navigator){try{swReg=await navigator.serviceWorker.register('/planning/sw.js',{scope:'/planning/'});}catch(e){}}
  let notifOk=false;
  if('Notification' in window){
    if(Notification.permission==='granted')notifOk=true;
    else if(Notification.permission!=='denied'){const p=await Notification.requestPermission();notifOk=p==='granted';}
  }
  function check(){
    const now=new Date();const h=now.getHours(),m=now.getMinutes(),dy=now.getDay();
    const dayName=Object.keys(JIDX).find(k=>JIDX[k]===dy);
    if(!dayName)return;
    if(h===15&&m===0){
      const cle="alerte_"+now.toDateString();
      if(localStorage.getItem(cle))return;
      localStorage.setItem(cle,"1");
      const non=nonCoches(dayName);if(!non.length)return;
      const msg=non.length===1?"1 tâche non cochée : "+non[0]:non.length+" tâches : "+non.slice(0,3).join(", ");
      if(notifOk&&swReg){swReg.showNotification("⏰ Planning — "+DLF[dayName]+" 15h",{body:msg,requireInteraction:true,tag:"planning-15h"});}
      banniere(dayName,non);
    }
  }
  setInterval(check,30000);
  window.testerAlerte=function(){
    const now=new Date();const dy=now.getDay();
    const dayName=Object.keys(JIDX).find(k=>JIDX[k]===dy)||"lundi";
    const non=nonCoches(dayName);
    if(!non.length){alert("Toutes les tâches de "+DLF[dayName]+" sont cochées !");return;}
    banniere(dayName,non);
    if(notifOk&&swReg){const msg=non.length===1?"1 tâche : "+non[0]:non.length+" tâches : "+non.slice(0,3).join(", ");
      swReg.showNotification("⏰ Planning — "+DLF[dayName]+" 15h",{body:msg,requireInteraction:true,tag:"planning-15h-test"});}
  };
}
initAlertes();
</script>
